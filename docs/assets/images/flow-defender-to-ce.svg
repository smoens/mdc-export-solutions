<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <!-- Subtle drop shadow for icons -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <!-- Glow for the data dot -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Connector path (used for both the visible line and motion path) -->
    <path id="connector" d="M 230 110 C 320 110, 360 110, 450 110" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="#f9fafb"/>

  <!-- ════════════════════════════════════════════════════════════════
       LEFT ICON - Microsoft Defender for Cloud (shield)
       Based on Azure Security Center icon silhouette
       ════════════════════════════════════════════════════════════════ -->
  <g transform="translate(100, 50)" filter="url(#shadow)">
    <!-- Shield background -->
    <path d="M 60 8 L 60 8 C 60 8 32 20 8 20 C 8 20 8 68 8 68 C 8 100 60 120 60 120 C 60 120 112 100 112 68 C 112 68 112 20 88 20 C 64 20 60 8 60 8 Z"
          fill="#0078D4" opacity="0.9"/>
    <!-- Shield highlight / inner shield -->
    <path d="M 60 18 C 60 18 40 28 20 28 C 20 28 20 66 20 66 C 20 92 60 110 60 110 C 60 110 100 92 100 66 C 100 66 100 28 80 28 C 60 28 60 18 60 18 Z"
          fill="#50a0e6" opacity="0.5"/>
    <!-- Checkmark -->
    <polyline points="42,65 55,80 82,50" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Left label -->
  <text x="160" y="195" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#333" font-weight="600">Defender for Cloud</text>

  <!-- ════════════════════════════════════════════════════════════════
       CONNECTOR LINE with arrow
       ════════════════════════════════════════════════════════════════ -->
  <use href="#connector" stroke="#0078D4" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Arrowhead -->
  <polygon points="450,104 450,116 464,110" fill="#0078D4" opacity="0.6"/>

  <!-- ════════════════════════════════════════════════════════════════
       ANIMATED DATA DOT
       A glowing circle that travels along the connector path
       ════════════════════════════════════════════════════════════════ -->
  <circle r="6" fill="#0078D4" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#connector"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Second dot offset by half cycle for continuous flow feel -->
  <circle r="4" fill="#50a0e6" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto" begin="1.25s">
      <mpath href="#connector"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0.8;0" dur="2.5s" repeatCount="indefinite" begin="1.25s"/>
  </circle>

  <!-- ════════════════════════════════════════════════════════════════
       RIGHT ICON - Continuous Export (cloud + upload arrow)
       ════════════════════════════════════════════════════════════════ -->
  <g transform="translate(470, 50)" filter="url(#shadow)">
    <!-- Cloud shape -->
    <path d="M 95 90 L 25 90 C 11 90 0 79 0 65 C 0 53 8 43 20 40 C 18 28 27 16 40 14 C 50 12 60 18 64 28 C 68 22 76 18 85 20 C 96 22 104 32 104 44 C 116 46 124 56 124 68 C 124 80 114 90 100 90 Z"
          fill="#0078D4" opacity="0.85"/>
    <!-- Upload arrow (export symbol) -->
    <line x1="62" y1="78" x2="62" y2="48" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <polyline points="46,60 62,44 78,60" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right label -->
  <text x="534" y="195" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#333" font-weight="600">Continuous Export</text>

  <!-- ════════════════════════════════════════════════════════════════
       TITLE (top-right area, subtle)
       ════════════════════════════════════════════════════════════════ -->
  <text x="790" y="24" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="11" fill="#999" font-style="italic">Security findings flow</text>
</svg>
