    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Full connector path across all 4 stages -->
    <path id="connector-full" d="M 155 110 C 200 110, 230 110, 280 110 L 380 110 C 420 110, 450 110, 500 110 L 600 110 C 640 110, 670 110, 720 110" fill="none"/>
