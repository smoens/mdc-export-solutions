<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="connector-full" d="M 170 110 C 220 110, 260 110, 310 110 L 410 110 C 450 110, 480 110, 520 110" fill="none"/>
    <!-- Mask to hide dots behind intermediate icon -->
    <mask id="dot-mask">
      <rect width="700" height="220" fill="white"/>
      <rect x="285" y="42" width="100" height="100" rx="14" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="700" height="220" rx="12" fill="#f9fafb"/>

  <!-- ═══════ STAGE 1: Azure Resource Graph Explorer (official icon) ═══════ -->
  <rect x="60" y="42" width="100" height="100" rx="14" fill="#fff" filter="url(#shadow)" opacity="0.85"/>
  <svg x="65" y="47" width="90" height="90" viewBox="0 0 18 18">
    <defs>
      <linearGradient id="rge-grad1" x1="2.63" y1="5.99" x2="2.63" y2="1.75" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#773adc"/><stop offset="1" stop-color="#b77af4"/>
      </linearGradient>
      <linearGradient id="rge-grad2" x1="14.76" y1="6.31" x2="14.76" y2="0.85" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#773adc"/><stop offset="1" stop-color="#b77af4"/>
      </linearGradient>
      <linearGradient id="rge-grad3" x1="11.92" y1="17.27" x2="11.92" y2="7.71" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#773adc"/><stop offset="1" stop-color="#b77af4"/>
      </linearGradient>
    </defs>
    <path d="M11.56,14.24,1.79,4.35A.77.77,0,0,1,2.34,3H14.76V4.58H4.19l8.47,8.58Z" fill="#b796f9"/>
    <ellipse cx="2.63" cy="3.87" rx="2.13" ry="2.12" fill="url(#rge-grad1)"/>
    <ellipse cx="14.76" cy="3.58" rx="2.74" ry="2.73" fill="url(#rge-grad2)"/>
    <ellipse cx="11.92" cy="13.69" rx="3.47" ry="3.46" fill="url(#rge-grad3)"/>
  </svg>
  <text x="110" y="190" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#333" font-weight="600">Resource Graph</text>
  <text x="110" y="205" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">cross-subscription</text>

  <!-- Connector 1 -->
  <line x1="175" y1="110" x2="275" y2="110" stroke="#0078D4" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
  <polygon points="275,104 275,116 289,110" fill="#0078D4" opacity="0.5"/>

  <!-- ═══════ STAGE 2: PowerShell (official icon) ═══════ -->
  <rect x="285" y="42" width="100" height="100" rx="14" fill="#fff" filter="url(#shadow)" opacity="0.85"/>
  <svg x="290" y="47" width="90" height="90" viewBox="0 0 18 18">
    <defs>
      <linearGradient id="ps-grad" x1="9" y1="15.834" x2="9" y2="5.788" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#32bedd"/><stop offset="0.175" stop-color="#32caea"/><stop offset="0.41" stop-color="#32d2f2"/><stop offset="0.775" stop-color="#32d4f5"/>
      </linearGradient>
    </defs>
    <path d="M.5,5.788h17a0,0,0,0,1,0,0v9.478a.568.568,0,0,1-.568.568H1.068A.568.568,0,0,1,.5,15.266V5.788A0,0,0,0,1,.5,5.788Z" fill="url(#ps-grad)"/>
    <path d="M1.071,2.166H16.929a.568.568,0,0,1,.568.568V5.788a0,0,0,0,1,0,0H.5a0,0,0,0,1,0,0V2.734A.568.568,0,0,1,1.071,2.166Z" fill="#0078d4"/>
    <path d="M4.292,7.153h.523a.167.167,0,0,1,.167.167v3.858a.335.335,0,0,1-.335.335H4.125a0,0,0,0,1,0,0V7.321a.167.167,0,0,1,.167-.167Z" transform="translate(-5.271 5.967) rotate(-45.081)" fill="#f2f2f2"/>
    <path d="M4.32,9.647h.523a.167.167,0,0,1,.167.167v4.131a0,0,0,0,1,0,0H4.488a.335.335,0,0,1-.335-.335v-3.8a.167.167,0,0,1,.167-.167Z" transform="translate(-0.504 23.385) rotate(-135.081)" fill="#e6e6e6"/>
    <rect x="7.221" y="12.64" width="4.771" height="1.011" rx="0.291" fill="#f2f2f2"/>
  </svg>
  <text x="335" y="190" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#333" font-weight="600">PowerShell</text>
  <text x="335" y="205" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">export script</text>

  <!-- Connector 2 -->
  <line x1="395" y1="110" x2="495" y2="110" stroke="#0078D4" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
  <polygon points="495,104 495,116 509,110" fill="#0078D4" opacity="0.5"/>

  <!-- ═══════ STAGE 3: Power BI Embedded (official icon) ═══════ -->
  <rect x="505" y="42" width="100" height="100" rx="14" fill="#fff" filter="url(#shadow)" opacity="0.85"/>
  <svg x="510" y="47" width="90" height="90" viewBox="0 0 18 18">
    <defs>
      <clipPath id="pbi-clip">
        <path d="M9.71,1.185a.711.711,0,0,1,.711-.711h4.263a.71.71,0,0,1,.71.711v15.63a.71.71,0,0,1-.71.711H3.316a.71.71,0,0,1-.71-.711V9.71A.71.71,0,0,1,3.316,9H6.158V5.448a.711.711,0,0,1,.711-.711H9.71Z" fill="none"/>
      </clipPath>
      <linearGradient id="pbi-grad1" x1="214.573" y1="491.263" x2="222.068" y2="507.151" gradientTransform="translate(-206 -490.699)" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#e6ad10"/><stop offset="1" stop-color="#c87e0e"/>
      </linearGradient>
      <linearGradient id="pbi-grad2" x1="211.689" y1="495.678" x2="217.993" y2="507.903" gradientTransform="translate(-206 -490.699)" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#f6d751"/><stop offset="1" stop-color="#e6ad10"/>
      </linearGradient>
      <linearGradient id="pbi-grad3" x1="209.39" y1="499.368" x2="212.873" y2="507.624" gradientTransform="translate(-206 -490.699)" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#f9e589"/><stop offset="1" stop-color="#f6d751"/>
      </linearGradient>
    </defs>
    <g clip-path="url(#pbi-clip)">
      <path d="M15.394.474V17.526H9.71V.474Z" fill="url(#pbi-grad1)"/>
      <path d="M11.842,5.448V17.526H6.158V4.737h4.973A.711.711,0,0,1,11.842,5.448Z" fill="url(#pbi-grad2)"/>
      <path d="M2.606,9v8.526H8.29V9.71A.711.711,0,0,0,7.579,9Z" fill="url(#pbi-grad3)"/>
    </g>
  </svg>
  <text x="555" y="190" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#333" font-weight="600">CSV / Power BI</text>
  <text x="555" y="205" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#666">reports &amp; dashboards</text>

  <!-- ═══════ ANIMATED DATA DOTS ═══════ -->
  <g mask="url(#dot-mask)">
    <circle r="5" fill="#0078D4" filter="url(#glow)">
      <animateMotion dur="2.8s" repeatCount="indefinite">
        <mpath href="#connector-full"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#50a0e6" filter="url(#glow)">
      <animateMotion dur="2.8s" repeatCount="indefinite" begin="1.4s">
        <mpath href="#connector-full"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0.8;0.8;0" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="690" y="22" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="11" fill="#999" font-style="italic">Resource Graph Export</text>
</svg>
